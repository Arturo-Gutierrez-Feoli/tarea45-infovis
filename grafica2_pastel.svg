    DS:   263.0 → 314.5°  (14.3%)
    Other:314.5 → 360°    (12.7% + rounding)

    Using large-arc-flag and sweep-flag=1
    Coordinates pre-calculated:
  -->

  <!-- PS2: 0° to 80.28° -->
  <path id="slice-0" href="#row-0"
